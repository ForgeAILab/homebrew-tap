name: Update Forge formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Forge version to publish, with or without leading v. Leave blank for latest."
        required: false
        type: string
  repository_dispatch:
    types:
      - forge-release

permissions:
  contents: write

jobs:
  update:
    name: Update formula
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="${INPUT_VERSION:-${DISPATCH_VERSION:-}}"
          version="${version#v}"

          if [[ -z "$version" ]]; then
            version="$(gh release view --repo ForgeAILab/forge --json tagName --jq '.tagName')"
            version="${version#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid Forge version: $version" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Update formula
        run: ./scripts/update-checksums.sh "${{ steps.version.outputs.version }}"

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit update locally
        if: steps.diff.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/forge.rb
          git commit -m "Update forge formula to v${VERSION}"

      - name: Tap local checkout
        run: brew tap forgeailab/tap "$GITHUB_WORKSPACE"

      - name: Audit formula
        run: brew audit --strict --online forgeailab/tap/forge

      - name: Push update
        if: steps.diff.outputs.changed == 'true'
        run: git push

      - name: Already current
        if: steps.diff.outputs.changed != 'true'
        run: echo "Formula already points at v${{ steps.version.outputs.version }}"
